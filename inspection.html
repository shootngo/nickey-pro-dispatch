<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Trailer Inspection - Nickey Dispatch V 6.0</title>
<meta name="theme-color" content="#cc0000">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:#1a1a1a;color:#eee;min-height:100vh;font-size:17.5px}
.hdr{background:#cc0000;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #ffd700;position:sticky;top:0;z-index:100}
.hdr-logo{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:1.5px}
.back-btn-hdr{background:#8a0000;color:#fff;padding:8px 14px;border-radius:8px;font-weight:700;text-decoration:none;font-size:14px;border:none;cursor:pointer}

.toggle-row{display:flex;gap:8px;padding:14px 18px;background:#0a0a0a;border-bottom:1px solid #333;position:sticky;top:62px;z-index:90}
.toggle-btn{flex:1;padding:14px;background:#2a2a2a;color:#aaa;border:1.5px solid #555;border-radius:8px;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.toggle-btn.active{background:#cc0000;color:#fff;border-color:#ffd700}

.sec{background:#252525;border-radius:12px;border:1px solid #333;margin:14px 18px}
.sh{background:#1e3a8a;padding:13px 16px;border-radius:12px 12px 0 0}
.st{font-family:'Rajdhani',sans-serif;font-size:14.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff}
.sb{padding:18px}

.fld{margin-bottom:18px}
.fld label{font-size:14px;font-weight:600;color:#ccc;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:7px}
.fld input,.fld select,.fld textarea{border:1.8px solid #555;border-radius:8px;padding:14px;font-size:18px;background:#2a2a2a;color:#eee;width:100%;outline:none}

.check-row{display:flex;align-items:center;justify-content:space-between;padding:14px;background:#1f1f1f;border:1px solid #444;border-radius:8px;margin-bottom:8px;cursor:pointer}
.check-row .label{font-size:16px;color:#eee;flex:1}
.check-row .status-toggle{display:flex;gap:6px}
.check-row .status-btn{padding:8px 14px;background:#2a2a2a;color:#888;border:1.5px solid #555;border-radius:6px;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;min-width:54px}
.check-row .status-btn.ok.active{background:#28a745;color:#fff;border-color:#28a745}
.check-row .status-btn.bad.active{background:#cc0000;color:#fff;border-color:#cc0000}
.check-row .status-btn.na.active{background:#666;color:#fff;border-color:#888}

.sds-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 18px}
.sds-btn{padding:18px 14px;background:#2a2a2a;color:#ffd700;border:2px solid #555;border-radius:10px;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;text-align:center}
.sds-btn:hover{border-color:#ffd700;background:#3a3a3a}

.sds-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;z-index:300;align-items:flex-start;justify-content:center;overflow-y:auto}
.sds-overlay.show{display:flex}
.sds-modal{background:#1a1a1a;width:96%;max-width:600px;border-radius:14px;border:2px solid #ffd700;margin:10px auto 30px;padding-bottom:20px}
.sds-header{background:#cc0000;padding:16px 18px;border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:space-between}
.sds-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:1.5px;line-height:1.2}
.sds-close{background:#8a0000;color:#fff;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;border:none;font-size:15px}
.sds-body{padding:16px 18px}
.sds-section{margin-bottom:14px}
.sds-section h3{color:#ffd700;font-family:'Rajdhani',sans-serif;font-size:16px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #444}
.sds-section p{font-size:15px;line-height:1.5;color:#ddd;margin-bottom:8px}
.sds-section ul{margin-left:18px;color:#ddd;font-size:15px;line-height:1.6}
.sds-section .alert{background:#2a0a0a;border:1px solid #cc0000;border-radius:8px;padding:10px;color:#ff8888;font-weight:700;margin:8px 0}

.action-btn{width:calc(100% - 36px);margin:14px 18px;padding:16px;background:#4caf50;color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer}
.action-btn.red{background:#cc0000}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">🚛 TRAILER INSPECTION</div>
  <a href="index.html" class="back-btn-hdr">← BACK</a>
</div>

<!-- Pre-Trip / Post-Trip Toggle -->
<div class="toggle-row">
  <button class="toggle-btn active" id="preTripBtn" onclick="setInspectionType('pre')">PRE-TRIP</button>
  <button class="toggle-btn" id="postTripBtn" onclick="setInspectionType('post')">POST-TRIP</button>
</div>

<!-- Driver / Trailer Info -->
<div class="sec">
  <div class="sh"><div class="st">Driver & Equipment</div></div>
  <div class="sb">
    <div class="fld">
      <label>Driver Name</label>
      <input type="text" id="inspDriver" placeholder="Frank Mulkey">
    </div>
    <div class="fld">
      <label>Date</label>
      <input type="date" id="inspDate">
    </div>
    <div class="fld">
      <label>Trailer Number</label>
      <input type="text" id="inspTrailer" placeholder="SD 45">
    </div>
    <div class="fld">
      <label>Odometer</label>
      <input type="number" id="inspOdo" placeholder="0">
    </div>
  </div>
</div>

<!-- Tractor Inspection -->
<div class="sec">
  <div class="sh"><div class="st">Tractor</div></div>
  <div class="sb" id="tractorChecks"></div>
</div>

<!-- Trailer Inspection -->
<div class="sec">
  <div class="sh"><div class="st">Trailer</div></div>
  <div class="sb" id="trailerChecks"></div>
</div>

<!-- Defects / Notes -->
<div class="sec">
  <div class="sh"><div class="st">Defects / Notes</div></div>
  <div class="sb">
    <textarea id="inspNotes" rows="6" placeholder="Describe any defects or issues found during inspection..."></textarea>
  </div>
</div>

<!-- Chemical Safety Quick Reference (SDS) -->
<div class="sec">
  <div class="sh"><div class="st">⚠️ Chemical Safety Quick Reference (SDS)</div></div>
  <div class="sds-grid">
    <button class="sds-btn" onclick="openSDS('spectrum22')">🧪 Spectrum 22</button>
    <button class="sds-btn" onclick="openSDS('vigorox')">🧪 VigorOx WWT II</button>
    <button class="sds-btn" onclick="openSDS('superd')">🧪 Super D 500</button>
    <button class="sds-btn" onclick="openSDS('erg')">🚨 ERG Placard Lookup</button>
  </div>
</div>

<button class="action-btn" onclick="saveInspection()">💾 Save Inspection</button>
<button class="action-btn red" onclick="clearInspection()">🗑️ Clear Form</button>

<!-- SDS Modals -->
<div class="sds-overlay" id="sdsOverlay">
  <div class="sds-modal">
    <div class="sds-header">
      <div class="sds-title" id="sdsTitle">Chemical Safety</div>
      <button class="sds-close" onclick="closeSDS()">✕ Close</button>
    </div>
    <div class="sds-body" id="sdsBody"></div>
  </div>
</div>

<script>
let inspectionType = 'pre';

const tractorItems = [
  "Air Compressor", "Air Lines", "Battery", "Body / Cab", "Brake Accessories",
  "Brakes (Service)", "Brakes (Parking)", "Clutch", "Coupling Devices",
  "Defroster / Heater", "Drive Line", "Engine", "Exhaust", "Fifth Wheel",
  "Frame & Assembly", "Front Axle", "Fuel Tanks", "Horn", "Lights (Head/Stop/Tail)",
  "Mirrors", "Oil Pressure", "On-Board Recorder", "Radiator", "Rear End",
  "Reflectors / Reflective Tape", "Safety Equipment (Triangles, Extinguisher, Flares)",
  "Steering", "Suspension", "Tires", "Transmission", "Trip Recorder",
  "Wheels & Rims", "Windows", "Windshield Wipers", "Other"
];

const trailerItems = [
  "Brake Connections", "Brakes", "Coupling Devices", "Coupling (King) Pin",
  "Doors", "Hitch", "Landing Gear", "Lights - All", "Reflectors / Reflective Tape",
  "Roof", "Suspension System", "Tarpaulin", "Tires", "Wheels & Rims",
  "Other - Tank Hoses & Connections", "Other - Tank Valves", "Other - Vents",
  "Other - Manhole Covers", "Other"
];

function buildChecklist(containerId, items, prefix){
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  items.forEach((item, idx) => {
    const id = prefix + '-' + idx;
    const row = document.createElement('div');
    row.className = 'check-row';
    row.innerHTML =
      '<div class="label">' + item + '</div>' +
      '<div class="status-toggle">' +
        '<button class="status-btn ok" data-id="' + id + '" data-status="ok">OK</button>' +
        '<button class="status-btn bad" data-id="' + id + '" data-status="bad">BAD</button>' +
        '<button class="status-btn na" data-id="' + id + '" data-status="na">N/A</button>' +
      '</div>';
    c.appendChild(row);
  });
  c.querySelectorAll('.status-btn').forEach(b => {
    b.addEventListener('click', function(){
      const id = b.dataset.id;
      const peers = c.querySelectorAll('[data-id="' + id + '"]');
      peers.forEach(p => p.classList.remove('active'));
      b.classList.add('active');
    });
  });
}

function setInspectionType(t){
  inspectionType = t;
  document.getElementById('preTripBtn').classList.toggle('active', t === 'pre');
  document.getElementById('postTripBtn').classList.toggle('active', t === 'post');
}

function clearInspection(){
  if (!confirm('Clear the inspection form?')) return;
  document.getElementById('inspDriver').value = '';
  document.getElementById('inspTrailer').value = '';
  document.getElementById('inspOdo').value = '';
  document.getElementById('inspNotes').value = '';
  document.querySelectorAll('.status-btn.active').forEach(b => b.classList.remove('active'));
  document.getElementById('inspDate').value = new Date().toISOString().split('T')[0];
}

function saveInspection(){
  const data = {
    type: inspectionType,
    driver: document.getElementById('inspDriver').value,
    date: document.getElementById('inspDate').value,
    trailer: document.getElementById('inspTrailer').value,
    odometer: document.getElementById('inspOdo').value,
    notes: document.getElementById('inspNotes').value,
    tractor: {}, trailer: {},
    timestamp: new Date().toISOString()
  };
  document.querySelectorAll('#tractorChecks .status-btn.active').forEach(b => {
    data.tractor[b.dataset.id] = b.dataset.status;
  });
  document.querySelectorAll('#trailerChecks .status-btn.active').forEach(b => {
    data.trailer[b.dataset.id] = b.dataset.status;
  });
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem('inspectionRecords') || '[]'); } catch(e){ saved = []; }
  saved.push(data);
  localStorage.setItem('inspectionRecords', JSON.stringify(saved));
  alert('Inspection saved!');
}

// SDS Data
const sdsData = {
  spectrum22: {
    title: "Spectrum 22 — Disinfectant",
    sections: [
      {h: "Identity", p: "Quaternary ammonium-based disinfectant cleaner. Concentrated liquid. Light yellow to clear."},
      {h: "Hazards", alert: "⚠️ Causes severe skin burns and eye damage. Harmful if swallowed. Toxic to aquatic life."},
      {h: "First Aid", l: ["EYES: Flush with water 15+ minutes. Get medical attention.", "SKIN: Wash with soap and water. Remove contaminated clothing.", "INHALATION: Move to fresh air. Get medical attention if symptoms persist.", "INGESTION: Do NOT induce vomiting. Drink water. Get medical attention."]},
      {h: "Spill Response", l: ["Wear PPE: gloves, eye protection, boots", "Contain spill — do NOT let enter waterways/drains", "Absorb with sand or absorbent material", "Place in approved waste container"]},
      {h: "Emergency Contact", p: "CHEMTREC: 1-800-424-9300 (24-hour)"}
    ]
  },
  vigorox: {
    title: "VigorOx WWT II — Peracetic Acid",
    sections: [
      {h: "Identity", p: "Peroxyacetic acid mixture used in wastewater treatment. Clear, colorless to pale yellow liquid with strong vinegar odor."},
      {h: "Hazards", alert: "⚠️ Strong oxidizer — fire hazard. Causes severe skin burns and eye damage. Corrosive."},
      {h: "First Aid", l: ["EYES: Flush immediately with water 15+ minutes. Seek medical attention.", "SKIN: Remove clothing. Flush with water 15+ minutes. Seek medical attention.", "INHALATION: Move to fresh air. Apply oxygen if breathing difficult.", "INGESTION: Drink water. Do NOT induce vomiting. Get medical attention."]},
      {h: "Spill Response", l: ["Evacuate area — provide ventilation", "Wear acid-resistant PPE", "Dilute with large amounts of water", "Do NOT use absorbents like sawdust (can ignite)", "Contain runoff"]},
      {h: "Fire", p: "Use water spray, foam, dry chemical, or CO2. Cool containers with water spray."},
      {h: "Emergency Contact", p: "CHEMTREC: 1-800-424-9300 (24-hour)"}
    ]
  },
  superd: {
    title: "Super D 500 — Acidic Cleaner",
    sections: [
      {h: "Identity", p: "Acidic cleaner/descaler used in food processing facilities. Clear to slightly cloudy liquid."},
      {h: "Hazards", alert: "⚠️ Causes severe skin burns and eye damage. Harmful if inhaled. Acidic — pH below 2."},
      {h: "First Aid", l: ["EYES: Flush with water 15+ minutes — hold eyelids open. Seek medical attention.", "SKIN: Remove contaminated clothing. Wash with water 15+ minutes.", "INHALATION: Move to fresh air. Apply oxygen if breathing difficult.", "INGESTION: Drink water or milk. Do NOT induce vomiting."]},
      {h: "Spill Response", l: ["Wear acid-resistant PPE: gloves, goggles, apron", "Neutralize with sodium bicarbonate (baking soda) or soda ash", "Absorb with inert material (sand, vermiculite)", "Do NOT mix with bleach or chlorine — toxic gas"]},
      {h: "Emergency Contact", p: "CHEMTREC: 1-800-424-9300 (24-hour)"}
    ]
  },
  erg: {
    title: "ERG Placard Lookup",
    sections: [
      {h: "Common Tanker Placards", l: [
        "Class 8 (Corrosive) — White/Black diamond, test tube on hand",
        "UN 2796 — Sulfuric Acid",
        "UN 1789 — Hydrochloric Acid",
        "UN 1791 — Hypochlorite Solution (bleach)",
        "UN 3149 — Hydrogen Peroxide / Peracetic Acid mixture",
        "Class 5.1 (Oxidizer) — Yellow diamond with flame over circle"
      ]},
      {h: "Emergency Contacts", l: [
        "CHEMTREC: 1-800-424-9300",
        "National Response Center: 1-800-424-8802",
        "Local Emergency: 911"
      ]},
      {h: "Initial Response", l: [
        "Park upwind. Get to safe distance.",
        "Remove placard from this section if discrepancy.",
        "Note UN number from placard.",
        "Provide UN # to first responders.",
        "Reference physical ERG book in cab if available."
      ]},
      {h: "Note", p: "Always carry the current Emergency Response Guidebook (ERG) in the cab. This summary is a quick reference only — not a replacement for the full ERG."}
    ]
  }
};

function openSDS(key){
  const d = sdsData[key]; if (!d) return;
  document.getElementById('sdsTitle').textContent = d.title;
  let h = '';
  d.sections.forEach(s => {
    h += '<div class="sds-section"><h3>' + s.h + '</h3>';
    if (s.alert) h += '<div class="alert">' + s.alert + '</div>';
    if (s.p) h += '<p>' + s.p + '</p>';
    if (s.l) h += '<ul>' + s.l.map(i => '<li>' + i + '</li>').join('') + '</ul>';
    h += '</div>';
  });
  document.getElementById('sdsBody').innerHTML = h;
  document.getElementById('sdsOverlay').classList.add('show');
}
function closeSDS(){ document.getElementById('sdsOverlay').classList.remove('show'); }
document.getElementById('sdsOverlay').addEventListener('click', e => { if (e.target.id === 'sdsOverlay') closeSDS(); });

window.onload = function(){
  buildChecklist('tractorChecks', tractorItems, 'tractor');
  buildChecklist('trailerChecks', trailerItems, 'trailer');
  document.getElementById('inspDate').value = new Date().toISOString().split('T')[0];
  const driver = localStorage.getItem('currentDriver');
  if (driver) document.getElementById('inspDriver').value = driver;
};
</script>
</body>
</html>
