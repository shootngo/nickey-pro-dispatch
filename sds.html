<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>SDS Reference - Nickey Dispatch V 6.0</title>
<meta name="theme-color" content="#cc0000">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:#1a1a1a;color:#eee;min-height:100vh;font-size:16px;line-height:1.5}

/* Header */
.hdr{background:#cc0000;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #ffd700;position:sticky;top:0;z-index:100}
.hdr-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:1.5px;line-height:1.1}
.hdr-title .sub{display:block;font-size:12px;color:#ffaaaa;letter-spacing:2px;margin-top:2px}
.back-btn{background:#8a0000;color:#fff;padding:8px 14px;border-radius:8px;font-weight:700;text-decoration:none;font-size:14px;border:none;cursor:pointer}

/* CHEMTREC emergency bar - sticky */
.chemtrec-bar{background:#2a0000;border-bottom:2px solid #cc0000;padding:10px 14px;text-align:center;position:sticky;top:60px;z-index:90}
.chemtrec-label{color:#ff8888;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.chemtrec-call{display:block;background:#cc0000;color:#fff;padding:10px;border-radius:6px;font-size:16px;font-weight:700;text-decoration:none;letter-spacing:1px}

/* Account box */
.account-box{background:#2a2500;border:1px solid #ffd700;margin:12px 14px;padding:10px;border-radius:8px;text-align:center}
.account-label{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:1px}
.account-num{font-family:'Rajdhani',sans-serif;font-size:22px;color:#ffd700;font-weight:700;letter-spacing:3px;margin-top:3px}

/* Product header */
.product-hdr{padding:14px 16px;background:linear-gradient(135deg,#1e3a8a 0%,#0a1a3a 100%);border-bottom:1px solid #ffd700}
.product-hdr h1{font-family:'Rajdhani',sans-serif;font-size:24px;color:#ffd700;letter-spacing:1.5px;line-height:1.1}
.product-hdr .subtitle{font-size:14px;color:#a5d6a7;margin-top:4px}
.product-hdr .un-badges{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.un-badge{background:#cc0000;color:#fff;padding:6px 12px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px}
.un-badge.oxidizer{background:#ffd700;color:#000}
.un-badge.peroxide{background:linear-gradient(180deg,#cc0000 50%,#ffd700 50%);color:#000}

/* Section navigation */
.sds-nav{background:#0a0a0a;padding:10px 14px;border-bottom:1px solid #333;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.sds-nav-inner{display:inline-flex;gap:6px}
.sds-nav button{background:#2a2a2a;color:#ddd;border:1px solid #444;padding:7px 11px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;letter-spacing:0.5px}
.sds-nav button:hover{background:#1e3a8a;color:#fff;border-color:#ffd700}

/* Sections */
.sds-section{padding:14px 16px;border-bottom:1px solid #2a2a2a;scroll-margin-top:140px}
.sds-section h2{font-family:'Rajdhani',sans-serif;color:#ffd700;font-size:18px;margin-bottom:10px;border-bottom:1px solid #444;padding-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.sds-section h3{color:#fff;font-family:'Rajdhani',sans-serif;font-size:15px;margin:10px 0 6px;letter-spacing:1px;text-transform:uppercase}
.sds-section p{color:#ddd;font-size:14.5px;margin-bottom:8px}
.sds-section strong{color:#fff}
.sds-section ul{color:#ddd;padding-left:22px;margin:6px 0 10px;font-size:14.5px}
.sds-section ul li{margin-bottom:4px}

.sds-warn{background:#2a0000;border-left:4px solid #cc0000;padding:10px 12px;margin:8px 0;border-radius:4px;color:#ffaaaa;font-weight:600}
.sds-info{background:#0a1a2a;border-left:4px solid #1e3a8a;padding:10px 12px;margin:8px 0;border-radius:4px;color:#a5d6a7}
.sds-caution{background:#2a2500;border-left:4px solid #ffd700;padding:10px 12px;margin:8px 0;border-radius:4px;color:#ffe680}

/* Composition table */
.comp-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13.5px}
.comp-table th{background:#1e3a8a;color:#fff;padding:8px;text-align:left;font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:1px;text-transform:uppercase}
.comp-table td{background:#252525;color:#ddd;padding:8px;border-bottom:1px solid #333}

/* Hazard pills */
.pill-row{margin:8px 0;display:flex;flex-wrap:wrap;gap:6px}
.pill{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.pill.danger{background:#cc0000;color:#fff}
.pill.warn{background:#c67900;color:#fff}
.pill.info{background:#1e3a8a;color:#fff}
.pill.green{background:#28a745;color:#fff}

/* Placard images for placards page */
.placard-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:14px 0}
.placard-card{background:#1f1f1f;border:2px solid #ffd700;border-radius:10px;padding:14px;text-align:center;flex:1;min-width:160px;max-width:220px}
.placard-svg{width:120px;height:120px;margin:0 auto;display:block}
.placard-card h3{color:#ffd700;font-family:'Rajdhani',sans-serif;font-size:16px;margin-top:8px;letter-spacing:1px}
.placard-card p{font-size:13px;color:#aaa;margin-top:4px}

/* ERG Guide */
.erg-guide{background:#1f1f1f;border:2px solid #ffd700;border-radius:10px;padding:14px;margin:12px 0}
.erg-guide-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #ffd700}
.erg-guide-num{font-family:'Rajdhani',sans-serif;font-size:32px;color:#ffd700;font-weight:700;line-height:1}
.erg-guide-name{font-family:'Rajdhani',sans-serif;font-size:14px;color:#fff;text-align:right;letter-spacing:1px}
.erg-section{margin:10px 0;padding-left:6px;border-left:3px solid #444}
.erg-section h4{color:#ffd700;font-family:'Rajdhani',sans-serif;font-size:14px;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
.erg-section p, .erg-section li{font-size:13.5px;color:#ddd;margin-bottom:4px}

/* Back to top */
.to-top{display:block;background:#333;color:#ffd700;border:2px solid #555;padding:12px;margin:14px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;width:calc(100% - 28px);text-decoration:none}

/* Loading state */
.loading{text-align:center;padding:80px 20px;color:#ffd700;font-family:'Rajdhani',sans-serif;font-size:18px;letter-spacing:2px}
</style>
<script src="ndsync.js" defer></script>
</head>

    sections: [
      {n:1, title:"Identification", html:`
        <p><strong>Product Identifier:</strong> SPECTRUM® 22</p>

      {n:2, title:"Hazard Identification", html:`
        <h3>GHS Classification</h3>
        <div class="pill-row">
          <span class="pill danger">Organic Peroxide Type F</span>
          <span class="pill danger">Corrosive to Metal Cat 1</span>
          <span class="pill warn">Acute Toxicity Oral Cat 4</span>
          <span class="pill warn">Acute Toxicity Dermal Cat 4</span>
          <span class="pill warn">Acute Toxicity Inhalation Cat 4</span>

        <h3>Signal Word</h3>
        <div class="sds-warn"><strong>DANGER</strong></div>
        <h3>Hazard Statements</h3>
        <ul>
          <li>Heating may cause a fire.</li>
          <li>May be corrosive to metals.</li>
          <li>Harmful if swallowed, in contact with skin or if inhaled.</li>
          <li>Causes severe skin burns and eye damage.</li>
          <li>May cause respiratory irritation.</li>
        </ul>
        <h3>Precautionary Statements — Prevention</h3>
        <p>Keep away from heat, hot surfaces, sparks, open flames and other ignition sources. No smoking. Keep away from clothing and other combustible materials. Keep only in original packaging. Wear protective gloves/protective clothing/eye protection/face protection. Use only outdoors or in a well-ventilated area. Wash thoroughly after handling. Do not eat, drink or smoke when using this product. Do not breathe dust/fume/gas/mist/vapors/spray. Avoid release to the environment.</p>
        <h3>Response</h3>
        <ul>
          <li><strong>IF INHALED:</strong> Remove person to fresh air and keep comfortable for breathing.</li>
          <li><strong>IF IN EYES:</strong> Rinse cautiously with water for several minutes. Remove contact lenses, if present and easy to do. Continue rinsing.</li>
          <li><strong>IF ON SKIN (or hair):</strong> Take off immediately all contaminated clothing. Rinse skin with water [or shower].</li>

        <h3>Storage</h3>
        <p>Protect from sunlight. Store at temperatures not exceeding 50°C (122°F). Keep cool. Store separately. Store in corrosive resistant container with a resistant inner liner. Store locked up. Store in a well-ventilated place. Keep container tightly closed.</p>
      `},
      {n:3, title:"Composition", html:`
        <p><strong>Mixture</strong> — Preparation of perethanoic acid, hydrogen peroxide, ethanoic acid and water in balance.</p>
        <table class="comp-table">
          <tr><th>Chemical</th><th>CAS #</th><th>Content (%)</th></tr>
          <tr><td>Peracetic Acid</td><td>79-21-0</td><td>20 - 23%</td></tr>
          <tr><td>Hydrogen Peroxide</td><td>7722-84-1</td><td>8.5 - 10.5%</td></tr>

        </table>
        <p style="font-size:12px;color:#888;font-style:italic;">The exact concentration has been withheld as a trade secret.</p>

      {n:4, title:"First-Aid Measures", html:`
        <h3>General Information</h3>
        <p>Pay attention to self-protection. Move out of dangerous area. Do not leave the victim unattended. Keep patient warm and at rest. Place patients who are unconscious but breathing in the stabilized lateral position.</p>
        <h3>Inhalation</h3>
        <p>Potential for exposure by inhalation if aerosols or mists are generated. Bring affected person outside and ensure that he/she is comfortable. Get medical attention if any discomfort continues. With labored breathing: Provide with oxygen. Consult a doctor immediately. If the casualty is not breathing: Perform mouth-to-mouth resuscitation, notify emergency physician immediately.</p>
        <h3>Skin Contact</h3>
        <p>Immediately remove contaminated clothing. Wash off affected area immediately with plenty of water for at least 15 minutes. Get medical attention immediately.</p>
        <h3>Eye Contact</h3>
        <p>IF IN EYES: Rinse cautiously with water for several minutes. Remove contact lenses, if present and easy to do. Continue rinsing. Get medical attention immediately.</p>
        <h3>Ingestion</h3>
        <p>Do NOT induce vomiting. Rinse mouth. Immediately give large quantities of water to drink. Do not administer activated charcoal. Get medical attention immediately.</p>
        <div class="sds-warn"><strong>Symptoms:</strong> Causes serious eye damage. Causes skin burns. Causes respiratory tract burns. Aspiration hazard. Risk of pulmonary edema. Release of oxygen with potential gas embolism. Health injuries may be delayed.</div>

        <p>Causes skin burns. Causes serious eye damage. Causes respiratory tract burns. Toxic by inhalation.</p>

      {n:5, title:"Fire-Fighting Measures", html:`
        <h3>Suitable Extinguishing Media</h3>
        <p>Water spray, foam, dry powder or carbon dioxide.</p>
        <h3>Unsuitable Extinguishing Media</h3>
        <p>High volume water jet. Organic compounds.</p>
        <h3>Special Hazards</h3>
        <div class="sds-warn">Fire or high temperatures may cause decomposition. Release of oxygen may support combustion. Risk of overpressure and burst due to decomposition in confined spaces and pipes. During fire, gases hazardous to health may be formed. Vapours are heavier than air and may spread along floors. In case of major fires: hazard of conflagration, explosions and shooting flames.</div>
        <h3>Special Fire-Fighting Procedures</h3>
        <p>Evacuate personnel to safe areas. Remove sources of ignition. Prior to approaching the source of fire, confirm that containers are undamaged and not in a state of beginning decay (e.g. by using a thermal imaging camera). In case of fire, remove the endangered containers and bring to a safe place. Cool containers at risk with water or dilute with water (flooding). Pay attention to flashback. In case of major fires: fire fighting must proceed from a safe distance and taking good cover. <strong>Expect spontaneous decomposition at all times.</strong></p>
        <h3>Protective Equipment for Firefighters</h3>
        <p>As in any fire, wear self-contained positive-pressure breathing apparatus (MSHA/NIOSH approved or equivalent) and full protective gear.</p>
      `},
      {n:6, title:"Accidental Release", html:`
        <h3>Personal Precautions</h3>
        <p>For personal protection see Section 8.</p>
        <h3>Emergency Procedures</h3>
        <p>In the event of a spill or accidental release, notify relevant authorities in accordance with all applicable regulations. Evacuate area and do not approach spilled product. Sewer coverage. Make safe or remove all sources of ignition.</p>
        <h3>For Emergency Responders</h3>
        <ul>
          <li>Use personal protective equipment</li>
          <li>Evacuate personnel to safe areas</li>
          <li>Isolate defective containers immediately, if possible and safe to do</li>
          <li>Shut off leak, if possible and safe to do</li>
          <li><strong>Do NOT use organic material (e.g. wood) to stop a leak</strong></li>
          <li>Provide ventilation and confine spill</li>
          <li>Do not allow runoff to sewer</li>
          <li>Place defective containers in plastic waste receptacle (not metal)</li>
          <li>Do NOT seal defective containers airtight (danger of bursting from decomposition)</li>
          <li><strong>Never return spilled product into its original container for re-use (Risk of decomposition)</strong></li>
        </ul>
        <h3>Containment & Cleanup</h3>
        <p><strong>Larger quantities:</strong> Sewer coverage. Collect product in suitable plastic containers using appropriate equipment (e.g. liquid pump). Keep away from flammable substances and incompatible substances. Dispose of absorbed material per regulations. Rinse residue with plenty of water. Ventilate room.</p>
        <p><strong>Small amounts:</strong> Dam with sand or earth. Absorb with liquid-binding material (e.g. inert absorbent universalbinder). <strong>Do NOT use textiles, sawdust, or combustible substances.</strong> Dispose of per regulations. Rinse residue with plenty of water.</p>
        <h3>Environmental Precautions</h3>
        <p>Obey relevant local, state, provincial and federal laws and regulations. Do not contaminate any lakes, streams, ponds, groundwater or soil. If the product contaminates rivers and lakes or drains, inform respective authorities.</p>

      {n:7, title:"Handling & Storage", html:`
        <h3>Technical Measures</h3>
        <p>Observe occupational exposure limits and minimize the risk of inhalation of vapors and mist. Ensure suitable suction/aeration at the work place and with operational machinery. Suitable measuring processes: Hydrogen peroxide (H2O2) OSHA method ID 006 / VI-6; Acetic acid NIOSH method 1603 / OSHA method ID 186.</p>
        <h3>Safe Handling Advice</h3>
        <p>Handle in accordance with good industrial hygiene and safety practice. Avoid contact with eyes, skin, and clothing. Do not breathe in vapours, aerosols, sprays. Ensure good room ventilation. Use personal protective equipment. Check the proper condition of safety equipment before use. Immediately rinse contaminated or saturated clothing with water. Immediately remove contaminated clothing and change moistened/saturated work clothes. Contaminated work clothing should not be allowed out of the workplace. No eating, drinking, smoking, or snuffing tobacco at work. Wash face and/or hands before break and end of work. Use barrier cream regularly.</p>
        <ul>
          <li>Avoid impurities and heat effect</li>
          <li>Keep away from incompatible substances</li>
          <li>Decant only the product quantities needed for current work</li>
          <li>Do not empty container by means of pressure</li>
          <li>Avoid splashing</li>
          <li>Close containers immediately after use</li>
          <li>Avoid residues of the product on the containers</li>
          <li>Never return spilled product into its original container (Risk of decomposition)</li>
          <li>Carry out fire/open flame operations with written authorization only</li>
          <li>Carefully flush clear and render inert before working on containers and lines</li>
          <li>Use non-sparking tools</li>
          <li>Provide for installation of emergency shower and eye bath</li>
        </ul>
        <h3>Safe Storage Conditions</h3>
        <p>Avoid sun rays, heat, heat effect. Store in tightly closed original container in a well-ventilated place. <strong>Recommendation: Acid-proof floor.</strong> Only use containers specially permitted for: Peracetic acid. Use adequate venting devices on all packages, containers and tanks; check correct operation periodically. <strong>Do not confine product in unvented vessels or between closed valves.</strong> Risk of overpressure and burst due to decomposition in confined spaces and pipes.</p>
        <p>Packages, containers and tanks should regularly be checked by visual observation for any sign of abnormality (e.g. corrosion, exert pressure (bulging), temperature increase). <strong>Transport and store container in upright position only.</strong> Store containers so that liquids released are collected in a catch vessel in case of leaks. Observe shelf-life of the product.</p>
        <h3>Do NOT Store Together With</h3>
        <ul>
          <li>Heavy metal compounds, amines and their mixtures (decomposition hazard)</li>
          <li>Alkali compounds and solutions, reducing agents</li>
          <li>Metal salts and polymerizing substances (e.g. monomers like styrene, methyl methacrylate)</li>
          <li>Inflammable substances (risk of fire)</li>
          <li>Bases — store separately from oxidants</li>
          <li>Sources of ignition — No smoking</li>
        </ul>
        <h3>Safe Packaging Materials</h3>
        <p><strong>Suitable:</strong> Stainless Steel (1.4571), Polyethylene, Polytetrafluoroethylene, Polyvinyl chloride (PVC), Polypropylene, glass, ceramics.<br>
        <strong>Unsuitable:</strong> Steel, Iron, Copper, Brass, Bronze, Aluminium, Zinc, Tin, Lead, Mild steel.</p>
        <p><strong>Storage Temperature:</strong> 30°C / 86°F</p>
      `},
      {n:8, title:"Exposure Controls / PPE", html:`
        <h3>Occupational Exposure Limits</h3>
        <table class="comp-table">
          <tr><th>Component</th><th>Type</th><th>Value</th><th>Source</th></tr>

          <tr><td>Acetic acid</td><td>IDLH</td><td>50 ppm</td><td>NIOSH</td></tr>
          <tr><td>Peracetic acid</td><td>STEL</td><td>0.4 ppm</td><td>ACGIH</td></tr>
          <tr><td>Hydrogen peroxide</td><td>TWA</td><td>1 ppm / 1.4 mg/m³</td><td>ACGIH/OSHA</td></tr>
          <tr><td>Hydrogen peroxide</td><td>IDLH</td><td>75 ppm</td><td>NIOSH</td></tr>
        </table>
        <h3>Eye/Face Protection</h3>
        <p>For monitoring tasks: Wear frame spectacles with side protection. Wear goggles when filling, decanting or eliminating faults, if splashing/spraying is likely. <strong>When handling larger amounts: Additionally wear protective shield.</strong></p>
        <h3>Hand Protection</h3>
        <p><strong>Material:</strong> Polychloroprene (PCP)<br>
        <strong>Break-through time:</strong> > 480 min<br>
        <strong>Guideline:</strong> DIN EN 374</p>
        <p>Personal protective equipment that provides a barrier to prevent dermal exposure is required.</p>
        <h3>Skin and Body Protection</h3>
        <p>Suitable materials: PVC, neoprene, nitrile rubber, natural rubber, acid-proof. <strong>Do NOT wear protective clothes containing cotton.</strong></p>
        <ul>
          <li>For monitoring tasks: Usual laboratory protective clothing, protective apron</li>

        <p><strong>A self-contained breathing apparatus must be worn if the ambient oxygen content is < 17% (v/v) or if the situation is uncertain.</strong> Self-contained breathing apparatus (EN 133) — Observe limited wearing time of 30 minutes.</p>
      `},

      {n:10, title:"Stability & Reactivity", html:`
        <h3>Reactivity</h3>
        <div class="sds-warn">Hazard of self-accelerating, exothermic decomposition under oxygen release due to temperature/heat exposure, contaminations or contact with incompatible materials.</div>
        <h3>Chemical Stability</h3>
        <p>Stable under recommended storage conditions. Product is supplied in stabilised form. Commercial products are stabilised to reduce risk of decomposition due to contamination.</p>
        <h3>Possibility of Hazardous Reactions</h3>
        <p>Hazardous polymerisation does not occur. Risk of overpressure and burst due to decomposition in confined spaces and pipes. Release of oxygen may support combustion.</p>
        <h3>Conditions to Avoid</h3>
        <p>Sun rays, heat, heat effect.</p>
        <h3>Incompatible Materials</h3>
        <ul>
          <li>Impurities, decomposition catalysts</li>
          <li>Metals, non-ferrous metals, metal salts</li>
          <li>Reduction agents, alkaline solutions, amines</li>
          <li>Hydrocarbons, organic solvents</li>
          <li>Inflammable materials</li>
          <li>Polymerizing substances (monomers like styrene, methyl methacrylate, etc.)</li>
        </ul>
        <h3>Hazardous Decomposition Products</h3>
        <p>Decomposition products in case of thermal decomposition: water vapor, oxygen, acetic acid.</p>
      `},
      {n:11, title:"Toxicological Information", html:`
        <h3>Likely Routes of Exposure</h3>
        <p><strong>Inhalation:</strong> Relevant route of exposure.<br>
        <strong>Skin/Eye/Ingestion:</strong> If handled correctly, not a relevant route of exposure.</p>
        <h3>Acute Toxicity</h3>
        <p><strong>Oral ATEmix:</strong> 341.4 mg/kg<br>
        <strong>Dermal ATEmix:</strong> 1,040 mg/kg<br>
        <strong>Peracetic acid LC50 (Rat, 4h):</strong> 0.204 mg/L Dust and mist<br>
        <strong>Hydrogen peroxide LC50 (4h):</strong> 1.5 mg/L Dust and mist; 11 mg/L Vapour</p>
        <h3>Skin Corrosion/Irritation</h3>
        <div class="sds-warn">Corrosive. All components corrosive (≤ 0.05 h).</div>
        <h3>Serious Eye Damage</h3>
        <div class="sds-warn">Corrosive — Risk of serious damage to eyes.</div>
        <h3>Respiratory or Skin Sensitization</h3>
        <p>Not a skin sensitizer (Magnussona i Kligmana, OECD 406, Guinea Pig).</p>
        <h3>Carcinogenicity</h3>
        <p>Based on available data, the classification criteria are not met. No component identified as known/anticipated carcinogen by NTP, IARC, or OSHA.</p>
        <h3>Mutagenicity</h3>
        <p>No evidence of mutagenic effects.</p>
        <h3>STOT Single Exposure</h3>
        <p>Respiratory tract irritation.</p>
      `},
      {n:12, title:"Ecological Information", html:`
        <h3>Ecotoxicity — Aquatic Plants</h3>
        <p><strong>Peracetic acid EC50 (Algae, 72h):</strong> 0.16 mg/L (US-EPA method, analogy)<br>
        <strong>Peracetic acid NOEC (Algae, 72h):</strong> 0.061 mg/L<br>
        <strong>Hydrogen peroxide NOEC (Skeletonema costatum, 72h):</strong> 0.63 mg/L</p>
        <h3>Persistence and Degradability</h3>
        <p>98% (28d, OECD 301 E) — The product is easily biodegradable. At non-bacteriotoxic concentrations peracetic acid undergoes hydrolysis or decomposition, aerobic. (3h, OECD 209) peracetic acid, aerobic, DT50 of 30 mg PAA/L = < 3 minutes.</p>
        <h3>Bioaccumulative Potential</h3>
        <p>BCF: low. Log Kow: -0.52</p>
        <h3>PBT/vPvB</h3>
        <p>This substance/mixture contains no components considered to be PBT or vPvB at levels of 0.1% or higher.</p>
      `},
      {n:13, title:"Disposal Considerations", html:`
        <h3>General Information</h3>
        <p><strong>Do not return unused product to original container (risk of decomposition).</strong> Review all local, state and federal regulations concerning health and pollution for appropriate disposal procedures.</p>
        <h3>Disposal Methods</h3>
        <p>Pack and store waste like the pure substance and apply the label according to the contents for disposal. Both hazardous substance and dangerous goods classification & labelling must match the contents to be disposed of. Waste must be disposed of in accordance with local, state, provincial and federal laws and regulations. <strong>Empty containers must be handled with care due to product residue.</strong></p>
        <h3>Contaminated Packaging</h3>
        <p><strong>Unrinsed, fully emptied containers might catch fire due to decomposition of any residual amounts.</strong> Avoid accumulation in order to prevent or reduce fire hazard. Rinse empty containers before disposal; recommended cleaning agent: water. Offer rinsed packaging material to local recycling facilities. Do not reuse empty containers.</p>
      `},

      {n:2, title:"Hazard Identification", html:`
        <h3>GHS Classification</h3>

        <h3>Signal Word</h3>

        <h3>Precautionary Statements — Prevention</h3>
        <p>Keep away from heat, hot surfaces, sparks, open flames and other ignition sources. No smoking. Keep away from clothing and other combustible materials. Do not breathe dust/mist/spray. Wear protective gloves/protective clothing/eye protection/face protection. Avoid release to the environment.</p>

      {n:4, title:"First-Aid Measures", html:`
        <h3>General Information</h3>
        <p>Pay attention to self-protection. Move out of dangerous area. Do not leave the victim unattended. Keep patient warm and at rest. Place patients who are unconscious but breathing in the stabilized lateral position.</p>
        <h3>Inhalation</h3>
        <p>Potential for exposure by inhalation if aerosols or mists are generated. Bring affected person outside and ensure that he/she is comfortable. Get medical attention if any discomfort continues. With labored breathing: Provide with oxygen. Consult a doctor immediately. If casualty is not breathing: Perform mouth-to-mouth resuscitation, notify emergency physician immediately.</p>
        <h3>Skin Contact</h3>
        <p>Immediately remove contaminated clothing. Wash off affected area immediately with plenty of water for at least 15 minutes. Get medical attention immediately.</p>
        <h3>Eye Contact</h3>
        <p>IF IN EYES: Rinse cautiously with water for several minutes. Remove contact lenses, if present and easy to do. Continue rinsing. Get medical attention immediately.</p>
        <h3>Ingestion</h3>
        <p>Do NOT induce vomiting. Rinse mouth. Immediately give large quantities of water to drink. Do not administer activated charcoal. Get medical attention immediately.</p>
        <h3>Personal Protection for First-Aid Responders</h3>
        <p>First Aid responders should pay attention to self-protection and use the recommended protective clothing. Avoid inhalation, ingestion and contact with skin and eyes.</p>
      `},
      {n:5, title:"Fire-Fighting Measures", html:`
        <h3>Suitable Extinguishing Media</h3>
        <p>Water spray, foam, dry powder or carbon dioxide.</p>
        <h3>Special Hazards</h3>
        <div class="sds-warn">Combustible liquid. Fire or high temperatures may cause decomposition. Release of oxygen may support combustion. Risk of overpressure and burst due to decomposition in confined spaces and pipes. During fire, gases hazardous to health may be formed.</div>
        <h3>Special Fire-Fighting Procedures</h3>
        <p>Use extinguishing measures appropriate to local circumstances. Evacuate personnel to safe areas. Remove sources of ignition. Prior to approaching the source of fire, confirm that containers are undamaged (e.g. by using a thermal imaging camera). In case of fire, remove endangered containers to a safe place if it can be done safely. Cool containers at risk with water or dilute with water (flooding). Pay attention to flashback. <strong>In case of major fires: Due to the hazard of conflagration, explosions and shooting flames fire fighting must proceed from a safe distance and taking good cover. Expect spontaneous decomposition at all times.</strong> Try to cool down containers below the decomposition temperature. Under certain circumstances prefer controlled combustion to fire extinguishing.</p>
        <h3>Protective Equipment for Firefighters</h3>
        <p>Wear respiratory protective equipment independent of surrounding air and chemical protective suit.</p>
      `},
      {n:6, title:"Accidental Release", html:`
        <h3>Accidental Release Measures</h3>
        <p>In the event of a spill or accidental release, notify relevant authorities. Evacuate area and do not approach spilled product. Sewer coverage. Make safe or remove all sources of ignition.</p>
        <h3>For Emergency Responders</h3>
        <ul>
          <li>Use personal protective equipment</li>
          <li>Evacuate personnel to safe areas</li>
          <li>Isolate defective containers immediately, if possible and safe to do</li>
          <li>Shut off leak, if possible and safe to do</li>
          <li><strong>Do NOT use organic material (e.g. wood) to stop a leak</strong></li>
          <li>Provide ventilation and confine spill</li>
          <li>Do not allow runoff to sewer</li>
          <li>Place defective containers in plastic waste receptacle (not metal)</li>
          <li>Do NOT seal defective containers airtight (danger of bursting from product decomposition)</li>
          <li><strong>Never return spilled product into its original container for re-use (Risk of decomposition)</strong></li>
        </ul>
        <h3>Containment & Cleanup</h3>
        <p><strong>Larger quantities:</strong> Sewer coverage. Collect product in plastic containers using appropriate equipment (e.g. liquid pump). Keep away from flammable substances and incompatible substances.</p>
        <p><strong>Small amounts:</strong> Dam with sand or earth. Absorb with liquid-binding material (inert absorbent universalbinder). <strong>Do NOT use textiles, sawdust, or combustible substances.</strong></p>
        <h3>Environmental Precautions</h3>
        <p>Observe regulations on prevention of water pollution (collect, dam up, cover up). Do not allow substance to enter soil, bodies of water or sewage canals. If product contaminates rivers and lakes or drains, inform respective authorities.</p>
      `},
      {n:7, title:"Handling & Storage", html:`
        <h3>Technical Measures</h3>
        <p>Observe occupational exposure limits and minimize the risk of inhalation of vapors and mist. Ensure suitable suction/aeration at the work place and operational machinery. Suitable measuring processes: Hydrogen peroxide (H2O2) OSHA method ID 006/VI-6, Acetic acid NIOSH method 1603 / OSHA method ID 186.</p>
        <h3>Safe Handling</h3>
        <p>Handle in accordance with good industrial hygiene and safety practice. Avoid contact with eyes, skin, and clothing. Do not breathe vapours, aerosols, sprays. Ensure good room ventilation. Use personal protective equipment. Immediately rinse contaminated clothing with water. Immediately remove contaminated clothing.</p>
        <ul>
          <li>Avoid impurities and heat effect</li>
          <li>Keep away from incompatible substances</li>
          <li>Decant only the product quantities needed</li>
          <li>Do not empty container by means of pressure</li>
          <li>Avoid splashing</li>
          <li>Close containers immediately after use</li>
          <li>Never return spilled product into original container (Risk of decomposition)</li>
          <li>Carry out fire/open flame operations with written authorization only</li>
          <li>Use non-sparking tools</li>
          <li>Provide for installation of emergency shower and eye bath</li>
        </ul>
        <h3>Safe Storage</h3>
        <p>Store in cool, dry place. Avoid sun rays, heat, heat effect. Store in tightly closed original container in a well-ventilated place. <strong>Recommendation: Acid-proof floor.</strong> Only use containers specially permitted for: Peracetic acid. Use adequate venting devices on all packages, containers and tanks. Do not confine product in unvented vessels or between closed valves. <strong>Risk of overpressure and burst due to decomposition in confined spaces and pipes.</strong> Transport and store container in upright position only.</p>
        <h3>Do NOT Store Together With</h3>
        <ul>
          <li>Heavy metal compounds, amines and their mixtures</li>
          <li>Alkali compounds and solutions, reducing agents</li>
          <li>Metal salts and polymerizing substances (monomers like styrene, methyl methacrylate)</li>
          <li>Inflammable substances (risk of fire)</li>
          <li>Bases — store separately from oxidants</li>
        </ul>
        <h3>Safe Packaging Materials</h3>
        <p><strong>Suitable:</strong> Stainless Steel (1.4571), Polyethylene, Polytetrafluoroethylene, Polyvinyl chloride (PVC), Polypropylene, glass, ceramics.<br>
        <strong>Unsuitable:</strong> Steel, Iron, Copper, Brass, Bronze, Aluminium, Zinc, Tin, Lead, Mild steel.</p>
      `},
      {n:8, title:"Exposure Controls / PPE", html:`
        <h3>Eye/Face Protection</h3>
        <p>For monitoring tasks: Wear frame spectacles with side protection. Wear goggles when filling, decanting or eliminating faults, if splashing/spraying is likely. When handling larger amounts: Additionally wear protective shield.</p>
        <h3>Hand Protection</h3>
        <p><strong>Material:</strong> Polychloroprene (PCP)<br>
        <strong>Glove thickness:</strong> 0.65 mm<br>
        <strong>Break-through time:</strong> > 480 min<br>
        <strong>Guideline:</strong> DIN EN 374</p>
        <p>Wear chemical-resistant gloves.</p>
        <h3>Skin and Body Protection</h3>
        <p>Suitable materials: PVC, neoprene, nitrile rubber, natural rubber, acid-proof. <strong>Do NOT wear protective clothes containing cotton.</strong></p>
        <ul>
          <li>For monitoring: Usual lab clothing, protective apron</li>
          <li>When filling/decanting if splashing likely: Protective apron, chemical protective suit</li>
          <li>Larger quantities: Chemical protective suit, disposable protective suit</li>
          <li>Foot protection: Safety boots, protection class S2 or S4 (DIN EN 20345)</li>
        </ul>
        <h3>Respiratory Protection</h3>
        <p>If engineering controls do not maintain airborne concentrations below recommended exposure limits, an approved respirator must be worn. Full face mask with combination filter A2B2E2K1P2 (Draeger), OV/AG (3M), or ABEK2P3 (3M).</p>
        <p><strong>A self-contained breathing apparatus must be worn if the ambient oxygen content is < 17% (v/v) or if the situation is uncertain.</strong> Self-contained breathing apparatus (EN 133) — Observe limited wearing time of 30 minutes.</p>
      `},

        <p>BCF: low. Hydrogen peroxide quickly decomposes to oxygen and water.</p>
        <h3>PBT/vPvB</h3>
        <p>This substance/mixture contains no PBT or vPvB components at levels of 0.1% or higher.</p>
      `},
      {n:13, title:"Disposal Considerations", html:`
        <h3>General Information</h3>
        <p><strong>Do not return unused product to original container (risk of decomposition).</strong> Review all local, state and federal regulations.</p>
        <h3>Disposal Methods</h3>
        <p>Pack and store waste like the pure substance. Both hazardous substance and dangerous goods classification & labelling must match the contents to be disposed of. Offer surplus and non-recyclable solutions to a licensed disposal company. <strong>Dilute residual amounts and solutions no longer usable to a peroxide content of < 10% with water</strong>, so that no uncontrollable reactions may occur. With small amounts: Taking into account local regulations the product may be disposed of as waste water after neutralisation.</p>
        <h3>Contaminated Packaging</h3>
        <p><strong>Unrinsed, fully emptied containers might catch fire due to decomposition of any residual amounts.</strong> Avoid accumulation. Rinse empty containers before disposal; recommended cleaning agent: water. Do not reuse empty containers.</p>
      `},

    sections: [
      {n:1, title:"Identification", html:`
        <p><strong>Product Identifier:</strong> PERSYNT® 500 Super D</p>
        <p><strong>Synonyms:</strong> 7722-81-1, Hydrogen Peroxide Solution</p>
        <p><strong>Recommended Use:</strong> Personal care</p>

        <h3>Emergency Telephone</h3>

        CHEMTREC Mexico: 800 681 9531<br>
        CHEMTREC World: +1 703 527 3887</p>
      `},
      {n:2, title:"Hazard Identification", html:`
        <h3>GHS Classification</h3>
        <div class="pill-row">
          <span class="pill danger">Oxidizing Liquids Cat 2</span>
          <span class="pill warn">Acute Toxicity Oral Cat 4</span>
          <span class="pill warn">Acute Toxicity Inhalation Cat 4</span>
          <span class="pill danger">Skin Corrosion Cat 1B</span>
          <span class="pill danger">Eye Damage Cat 1</span>
          <span class="pill warn">STOT Single Cat 3 (Respiratory)</span>
        </div>
        <h3>Signal Word</h3>
        <div class="sds-warn"><strong>DANGER</strong></div>
        <h3>Hazard Statements</h3>
        <ul>
          <li>May intensify fire; oxidizer.</li>
          <li>Harmful if swallowed or if inhaled.</li>
          <li>Causes severe skin burns and eye damage.</li>
          <li>May cause respiratory irritation.</li>
        </ul>
        <h3>Precautionary Statements — Prevention</h3>
        <p>Keep away from heat, hot surfaces, sparks, open flames and other ignition sources. No smoking. <strong>Keep away from clothing, strong acids, bases, heavy metal salts and other reducing substances, and combustible materials.</strong> Take any precaution to avoid mixing with combustibles. Do not breathe dust/fume/gas/mist/vapors/spray. Wash face, hands and any exposed skin thoroughly after handling. Do not eat, drink or smoke when using this product. Use only outdoors or in a well-ventilated area. Avoid release to the environment. Wear protective gloves/protective clothing/eye protection/face protection.</p>
        <h3>Response</h3>
        <ul>
          <li><strong>IF SWALLOWED:</strong> Rinse mouth. Do NOT induce vomiting. Call POISON CENTER or doctor.</li>
          <li><strong>IF ON SKIN (or hair):</strong> Take off immediately all contaminated clothing. Rinse skin with water [or shower].</li>
          <li>Wash contaminated clothing before reuse.</li>
          <li><strong>IF INHALED:</strong> Remove person to fresh air. Immediately call POISON CENTER/doctor.</li>
          <li><strong>IF IN EYES:</strong> Rinse cautiously with water for several minutes. Continue rinsing.</li>
          <li><strong>In case of fire:</strong> Use dry sand, dry chemical or alcohol-resistant foam for extinction.</li>
        </ul>
        <h3>Storage</h3>
        <p>Store in a well-ventilated place. Keep container tightly closed. Store locked up.</p>
      `},
      {n:3, title:"Composition", html:`
        <p><strong>Mixture</strong></p>
        <table class="comp-table">
          <tr><th>Chemical</th><th>CAS #</th><th>Content (%)</th></tr>
          <tr><td>Hydrogen peroxide</td><td>7722-84-1</td><td>25 - <50%</td></tr>
        </table>
        <p style="font-size:12px;color:#888;font-style:italic;">The exact concentration has been withheld as a trade secret.</p>
      `},
      {n:4, title:"First-Aid Measures", html:`
        <h3>General Information</h3>
        <p>Pay attention to self-protection. Move out of dangerous area. Do not leave the victim unattended. Keep patient warm and at rest.</p>
        <h3>Inhalation</h3>
        <p>Bring affected person outside. Get medical attention if discomfort continues. With labored breathing: Provide with oxygen. Consult a doctor immediately. If casualty is not breathing: Perform mouth-to-mouth resuscitation, notify emergency physician immediately.</p>
        <h3>Skin Contact</h3>
        <p>Immediately remove contaminated clothing. Wash off affected area immediately with plenty of water for at least 15 minutes. If skin irritation or allergic skin reaction develops, get medical attention.</p>
        <h3>Eye Contact</h3>
        <p>IF IN EYES: Rinse cautiously with water for several minutes. Remove contact lenses, if present and easy to do. Continue rinsing. Get medical attention immediately.</p>
        <h3>Ingestion</h3>
        <p>Do NOT induce vomiting. Rinse mouth. Immediately give large quantities of water to drink. Do not administer activated charcoal. Get medical attention immediately.</p>
        <div class="sds-warn"><strong>Symptoms:</strong> Drowsiness, irritation of the esophagus, retrosternal burning, foaming at the mouth, nausea, vomiting and diarrhea. Possible loss of eyesight! Aspiration hazard due to foam formation. Risk of pulmonary edema. Release of oxygen with potential gas embolism. Health injuries may be delayed.</div>
        <h3>Hazards</h3>
        <p>Harmful by inhalation. Causes skin irritation. Causes serious eye damage.</p>
      `},
      {n:5, title:"Fire-Fighting Measures", html:`
        <h3>Suitable Extinguishing Media</h3>
        <p><strong>Water spray. Only water is recommended in case of fires involving substantial quantities of hydrogen peroxide.</strong> For small amounts: water, foam, dry powder, carbon dioxide.</p>
        <h3>Unsuitable Extinguishing Media</h3>
        <p>High volume water jet. Organic compounds.</p>
        <h3>Special Hazards</h3>
        <div class="sds-warn">Hydrogen Peroxide itself is not flammable. <strong>Drying of product on clothing or combustible materials such as paper, fabrics, leather, and wood may cause fire.</strong> Mixtures of Hydrogen Peroxide with flammable liquids (solvents) may possess explosive properties. Contamination can cause rapid decomposition, release of oxygen and pressure.</div>
        <div class="sds-warn">Contact with incompatible materials (e.g. metals, alkalis, reducing agents) will cause hazardous decomposition resulting in release of large quantities of heat, steam, and oxygen gas. <strong>This product spontaneously decomposes above 150°C.</strong> A severe detonation hazard may exist when mixed with organic liquids (kerosene, gasoline). Hydrogen Peroxide in proximity of an ongoing fire must be diluted with large volumes of water.</div>
        <h3>Special Fire-Fighting Procedures</h3>
        <p>Evacuate personnel to safe areas. Use extinguishing measures appropriate to local circumstances. <strong>Once concentrated solutions of hydrogen peroxide enter the sewage system, a spontaneous, explosive decomposition must be expected. An immediate addition of a huge amount of water from a safe distance is necessary.</strong> Cool containers at risk with water or dilute with water (flooding). Evacuate area and fight fire from a safe distance. Stay upwind; keep out of low areas. Containers can build up pressure if exposed to heat (fire). Cool with water spray.</p>
        <h3>Protective Equipment</h3>
        <p>As in any fire, wear self-contained positive-pressure breathing apparatus (MSHA/NIOSH approved or equivalent) and full protective gear. Use water spray or fog to knock down irritating vapor.</p>
      `},
      {n:6, title:"Accidental Release", html:`
        <h3>Personal Precautions</h3>
        <p>For personal protection see Section 8.</p>
        <h3>Accidental Release Measures</h3>
        <p>In the event of a spill or accidental release, notify relevant authorities. Evacuate area and do not approach spilled product. Sewer coverage. Make safe or remove all sources of ignition.</p>
        <div class="sds-warn"><strong>SPONTANEOUS COMBUSTION HAZARD:</strong> Combustible materials exposed to hydrogen peroxide should be immediately submerged in or rinsed with large amounts of water to ensure that all hydrogen peroxide is removed. Residual hydrogen peroxide allowed to dry (upon evaporation, hydrogen peroxide can concentrate) on organic materials such as paper, fabrics, cotton, leather, wood, or other combustibles, can cause the material to ignite and result in a fire.</div>
        <h3>For Emergency Responders</h3>
        <ul>
          <li>Use personal protective equipment</li>
          <li>Evacuate personnel to safe areas. Make safe or remove all sources of ignition</li>
          <li>Isolate defective containers immediately, if possible and safe to do</li>
          <li>Shut off leak, if possible and safe to do</li>
          <li><strong>Do NOT use organic material (e.g. wood) to stop a leak</strong></li>
          <li>Provide ventilation and confine spill</li>
          <li>Do not allow runoff to sewer</li>
          <li>Place defective containers in plastic waste receptacle (not metal)</li>
          <li>Do NOT seal defective containers airtight (danger of bursting from decomposition)</li>
          <li><strong>Never return spilled product into its original container for re-use (Risk of decomposition)</strong></li>
        </ul>
        <p>Once concentrated solutions enter sewage system, spontaneous explosive decomposition must be expected. Immediately add huge amount of water from a safe distance.</p>
        <h3>Containment & Cleanup</h3>
        <p><strong>Larger quantities:</strong> Sewer coverage. Collect product in plastic containers using appropriate equipment (liquid pump). Dispose per regulations. Rinse residue with plenty of water. Ventilate room.</p>
        <p><strong>Small amounts:</strong> Sewer coverage. Dam with sand or earth. Absorb with liquid-binding material (diatomaceous earth or universal binder). <strong>Do NOT use textiles, sawdust, or combustible substances.</strong></p>
      `},
      {n:7, title:"Handling & Storage", html:`
        <h3>Safe Handling</h3>
        <p>Handle in accordance with good industrial hygiene and safety practice. Avoid contact with eyes, skin, and clothing. Do not breathe vapours, aerosols, sprays. Use personal protective equipment.</p>
        <ul>
          <li><strong>Completely submerge hydrogen peroxide contaminated clothing or other materials in water prior to drying.</strong> Residual hydrogen peroxide, if allowed to dry on materials such as paper, fabrics, cotton, leather, wood or other combustibles can cause the material to ignite</li>
          <li>Avoid impurities and heat effect</li>
          <li>Keep away from incompatible substances</li>
          <li>Decant only the product quantities needed</li>
          <li>Do not empty container by means of pressure</li>
          <li>Avoid splashing</li>
          <li>Close containers immediately after use</li>
          <li>Never return spilled product into original container (Risk of decomposition)</li>
          <li>Carry out fire/open flame operations with written authorization only</li>
          <li>Use non-sparking tools</li>
          <li>Provide for installation of emergency shower and eye bath</li>
        </ul>
        <h3>Safe Storage</h3>
        <p>Store in cool, dry place. <strong>Keep at temperature not exceeding 40°C.</strong> Avoid sun rays, heat, heat effect. Store in tightly closed original container in a well-ventilated place. <strong>Jointless smooth concrete floor.</strong> Only use containers specially permitted for hydrogen peroxide. Use adequate venting devices on all packages, containers and tanks. <strong>Do not confine product in unvented vessels or between closed valves. Risk of overpressure and burst due to decomposition in confined spaces and pipes.</strong> Transport and store container in upright position only. Store containers so liquids released are collected in a catch vessel.</p>
        <h3>Do NOT Store Together With</h3>
        <ul>
          <li>Alkalis, reductants, metallic salts (risk of decomposition)</li>
          <li>Inflammable substances (risk of fire)</li>
          <li>Organic solvents (risk of explosion)</li>
          <li>Sources of ignition — No smoking</li>
        </ul>
        <p>Take precautionary measures against static charges. Measures for storing in tank installations include compatible materials, adequate separation, venting devices, temperature measurement, earthing (grounding), bund in case of leakage. Prior to first filling, all parts of facility must be thoroughly cleaned and flushed. Metal elements must first be pickled and passivated sufficiently. <strong>Consult NFPA 400 for storage area guidance.</strong></p>
        <h3>Safe Packaging Materials</h3>
        <p><strong>Suitable:</strong> Stainless steel 304L or 316L passivated, aluminium 5254 or 1060: min. 99.5% passivated, aluminium magnesium alloys passivated, Plastics: Polyethylene, polytetrafluoroethylene, Polyvinyl chloride (PVC), Polypropylene, glass, ceramics.<br>
        <strong>Unsuitable:</strong> Copper, Lead, Brass, Magnesium, Iron, Silver, Bronze, Zinc, Tin, Mild steel.</p>
      `},
      {n:8, title:"Exposure Controls / PPE", html:`
        <h3>Occupational Exposure Limits — Hydrogen Peroxide</h3>
        <table class="comp-table">
          <tr><th>Type</th><th>Value</th><th>Source</th></tr>
          <tr><td>TWA</td><td>1 ppm</td><td>ACGIH</td></tr>
          <tr><td>REL</td><td>1 ppm / 1.4 mg/m³</td><td>NIOSH</td></tr>
          <tr><td>PEL</td><td>1 ppm / 1.4 mg/m³</td><td>OSHA</td></tr>
          <tr><td>IDLH</td><td>75 ppm</td><td>NIOSH</td></tr>
          <tr><td>TWA</td><td>1 ppm / 1.4 mg/m³</td><td>OSHA Table Z-1-A</td></tr>
        </table>
        <h3>Eye/Face Protection</h3>
        <p>For monitoring tasks: Wear frame spectacles with side protection. Wear goggles when filling, decanting or eliminating faults, if splashing/spraying is likely. <strong>When handling larger amounts: Additionally wear protective shield.</strong></p>
        <h3>Hand Protection</h3>
        <p><strong>Material:</strong> Natural latex (NR), nitrile rubber (NBR)<br>
        <strong>Break-through time:</strong> > 480 min<br>
        <strong>Guideline:</strong> DIN EN 374</p>
        <p><strong>Alternative Material:</strong> Butyl rubber<br>
        <strong>Break-through time:</strong> > 480 min</p>
        <h3>Skin and Body Protection</h3>
        <p>Suitable materials: PVC, neoprene, nitrile rubber, natural rubber. <strong>Do NOT wear protective clothes containing cotton.</strong></p>
        <ul>
          <li>For monitoring: Usual lab clothing, protective apron</li>
          <li>When filling/decanting if splashing likely: Protective apron, chemical protective suit</li>
          <li>Larger quantities: Chemical protective suit, disposable protective suit</li>
          <li>Foot protection: Safety boots, protection class S2 or S4 (DIN EN 20345). <strong>Do NOT wear leather shoes.</strong></li>
        </ul>
        <h3>Respiratory Protection</h3>
        <p>If engineering controls do not maintain airborne concentrations below recommended exposure limits, an approved respirator must be worn. Wear suitable respiratory protection.</p>
        <p><strong>3M recommends the 3M 6003 Organic Vapor/Acid Gas Cartridge, the 3M 6006 Multi Gas/Vapor Cartridge, and equivalent cartridges or combination versions for H2O2 for concentrations up to ~ 90 ppm.</strong></p>
        <p><strong>A self-contained breathing apparatus must be worn if the ambient oxygen content is < 17% (v/v) or if the situation is uncertain.</strong> Self-contained breathing apparatus (EN 133) — Observe limited wearing time of 30 minutes.</p>
      `},

      {n:10, title:"Stability & Reactivity", html:`
        <h3>Reactivity</h3>
        <div class="sds-warn">Product is an oxidizing agent and reactive. Decomposition hazard in case of temperature/heat exposure, contaminations or contact with incompatible materials.</div>
        <h3>Chemical Stability</h3>
        <p>Stable under recommended storage conditions. Product is supplied in stabilised form. Commercial products are stabilised to reduce risk of decomposition due to contamination.</p>
        <h3>Possibility of Hazardous Reactions</h3>
        <div class="sds-warn">When coming in contact with the product, impurities, decomposition catalysts, incompatible substances, or combustible substances may lead to self-accelerated, exothermic decomposition and the formation of oxygen. Risk of overpressure and burst due to decomposition in confined spaces and pipes. Release of oxygen may support combustion. <strong>A severe detonation hazard may exist when mixed with organic liquids, e.g. kerosene or gasoline.</strong></div>
        <div class="sds-warn"><strong>SPONTANEOUS COMBUSTION HAZARD:</strong> Combustible materials exposed to hydrogen peroxide should be immediately submerged in or rinsed with large amounts of water. Residual hydrogen peroxide allowed to dry (upon evaporation can concentrate) on organic materials such as paper, fabrics, cotton, leather, wood, or other combustibles, can cause the material to ignite and result in a fire.</div>
        <h3>Conditions to Avoid</h3>
        <p>Sun rays, heat, heat effect.</p>
        <h3>Incompatible Materials</h3>
        <ul>
          <li>Impurities, decomposition catalysts</li>
          <li>Metals, metal salts, alkaline substances</li>
          <li>Hydrochloric acid, reduction agents</li>
          <li>Inflammable substances, organic solvents</li>
        </ul>
        <h3>Hazardous Decomposition Products</h3>
        <p>Decomposition products in case of thermal decomposition: water vapor, oxygen.</p>
      `},
      {n:11, title:"Toxicological Information", html:`
        <h3>Acute Toxicity</h3>
        <p><strong>Hydrogen peroxide LD50 (Rat oral):</strong> 431 mg/kg<br>
        <strong>Hydrogen peroxide LD50 (Rabbit dermal):</strong> 9,200 mg/kg<br>
        <strong>Hydrogen peroxide LC50 (4h):</strong> 1.5 mg/L Dust and mist; 11 mg/L Vapour</p>
        <h3>Repeated Dose Toxicity</h3>
        <p><strong>NOAEL (Mouse Female, Oral):</strong> 37 mg/kg drinking water analysis (H2O2 35%)<br>
        <strong>NOAEL (Mouse Male, Oral):</strong> 26 mg/kg drinking water analysis (H2O2 35%)</p>
        <h3>Skin Corrosion/Irritation</h3>
        <p>Irritating (OECD 404, Rabbit).</p>
        <h3>Serious Eye Damage</h3>
        <div class="sds-warn">Risk of serious damage to eyes (H2O2 35%).</div>
        <h3>Respiratory or Skin Sensitization</h3>
        <p>Not a skin sensitizer (Magnussona i Kligmana, Guinea Pig).</p>
        <h3>Carcinogenicity</h3>
        <p>Up to date there is no evidence of increased tumour risk. No component identified as known/anticipated carcinogen by NTP, IARC, or OSHA.</p>
        <h3>Mutagenicity</h3>
        <p><strong>In vitro:</strong> Bacterial reverse mutation assay: positive and negative; Chromosomal aberration (OECD 473): positive; Genetic mutation in mammal cells (OECD 476): positive<br>
        <strong>In vivo:</strong> Micronucleus test (OECD 474, Mouse intraperitoneal): negative</p>
      `},
      {n:12, title:"Ecological Information", html:`
        <h3>Ecotoxicity</h3>
        <p>Specific data not available for product. Hydrogen peroxide quickly decomposes to oxygen and water.</p>
        <h3>Toxicity to Aquatic Plants</h3>
        <p><strong>Hydrogen peroxide NOEC (Skeletonema costatum, marine diatom, 72h):</strong> 0.63 mg/L</p>
        <h3>Persistence and Degradability</h3>
        <p>Readily biodegradable. Semiquantitative measurement of concentration over time. Hydrogen peroxide (H2O2).</p>
        <h3>Bioaccumulative Potential</h3>
        <p>BCF: None. Hydrogen peroxide quickly decomposes to oxygen and water.<br>
        Log Kow: -1.57 at 68°F (QSAR, pure substance)</p>
        <h3>PBT/vPvB</h3>
        <p>This substance/mixture contains no PBT or vPvB components at levels of 0.1% or higher.</p>
      `},
      {n:13, title:"Disposal Considerations", html:`
        <h3>General Information</h3>
        <p><strong>Do not return unused product to original container (risk of decomposition).</strong> Review all local, state and federal regulations.</p>
        <h3>Disposal Methods</h3>
        <p>Pack and store waste like the pure substance and apply the label according to the contents for disposal. Both hazardous substance and dangerous goods classification & labelling must match the contents to be disposed of. Waste must be disposed of in accordance with local, state, provincial and federal laws and regulations. Empty containers must be handled with care due to product residue.</p>
        <p><strong>A possible method of disposal is to dilute with large amounts of water to a concentration of about 5% hydrogen peroxide; hold in diked area or pond until peroxide is completely decomposed</strong> or dispose according to all relevant local, provincial, state, and federal laws and regulations. Use personal protective equipment as described in Section 8.</p>
        <h3>Contaminated Packaging</h3>
        <p>Rinse empty containers before disposal; recommended cleaning agent: water. Offer rinsed packaging material to local recycling facilities. Do not reuse empty containers.</p>
      `},

// ── RENDERING ─────────────────────────────────────────────────────────────────
function renderCustomCard(data){
  document.getElementById('hdrTitle').innerHTML = 'CHEMICAL REFERENCE<span class="sub">' + escHtml(data.name) + '</span>';
  document.title = data.name + ' — Nickey Dispatch';
  let html = '';
  html += '<div class="product-hdr">';
  html += '<h1>' + escHtml(data.name) + '</h1>';
  if (data.unNumber || data.hazardClass){
    html += '<div class="subtitle">' + (data.unNumber ? escHtml(data.unNumber) : '') + (data.hazardClass ? ' &middot; ' + escHtml(data.hazardClass) : '') + '</div>';
  }
  html += '</div>';
  html += '<div class="sds-section"><h2>Personal Protective Equipment</h2>';
  html += data.ppeNotes ? '<p>' + escHtml(data.ppeNotes) + '</p>' : '<p style="color:#555;">Not specified</p>';
  html += '</div>';
  html += '<div class="sds-section"><h2>Emergency Response</h2>';
  html += data.emergencyNotes ? '<p>' + escHtml(data.emergencyNotes) + '</p>' : '<p style="color:#555;">Not specified</p>';
  html += '</div>';
  html += '<div class="sds-section"><div class="sds-caution"><strong>Note:</strong> This is a custom reference card, not an official SDS. Always consult the full official SDS for complete hazard and regulatory information.</div></div>';
  html += '<a class="to-top" href="javascript:scrollTo({top:0,behavior:\'smooth\'})">↑ Back to Top</a>';
  document.getElementById('content').innerHTML = html;
  document.getElementById('content').className = '';
}

function renderSDS(){
  const data = sdsData[chem];
  if (!data){
    document.getElementById('content').innerHTML = '<div style="padding:40px;text-align:center;color:#ff8888;">Unknown chemical: ' + chem + '</div>';
    return;
  }
  if (data._custom){ renderCustomCard(data); return; }

  document.getElementById('hdrTitle').innerHTML = 'SAFETY DATA SHEET<span class="sub">' + data.title + '</span>';
  document.title = data.title + ' SDS - Nickey Dispatch';

  let html = '';

  // Product header
  html += '<div class="product-hdr">';
  html += '<h1>' + data.title + '</h1>';
  html += '<div class="subtitle">' + data.subtitle + '</div>';
  html += '<div class="un-badges">' + data.unBadge + '</div>';
  html += '</div>';

  // Account box
  if (data.account){
    html += '<div class="account-box">';
    html += '<div class="account-label">Your Cab Card / Account #</div>';
    html += '<div class="account-num">' + data.account + '</div>';
    html += '</div>';
  }

  // Section nav
  html += '<div class="sds-nav"><div class="sds-nav-inner">';
  data.sections.forEach(s => {
    html += '<button onclick="scrollToSection(' + s.n + ')">' + s.n + '. ' + s.title + '</button>';
  });
  html += '</div></div>';

  // Sections
  data.sections.forEach(s => {
    html += '<div class="sds-section" id="section-' + s.n + '">';
    html += '<h2>' + s.n + '. ' + s.title + '</h2>';
    html += s.html;
    html += '</div>';
  });

  // Back to top
  html += '<a class="to-top" href="javascript:scrollTo({top:0,behavior:\'smooth\'})">↑ Back to Top</a>';

  document.getElementById('content').innerHTML = html;
  document.getElementById('content').className = '';
}

function scrollToSection(n){
  const el = document.getElementById('section-' + n);
  if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

window.onload = renderSDS;
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js', {scope: './'})
      .then(function(reg) {
        console.log('[SW] Registered, scope:', reg.scope);
        reg.addEventListener('updatefound', function() {
          var nw = reg.installing;
          nw.addEventListener('statechange', function() {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) showNDUpdateBanner();
          });
        });
      }).catch(function(err) { console.warn('[SW] Registration failed:', err); });
  });
}
function showNDUpdateBanner() {
  if (document.getElementById('ndUpdateBanner')) return;
  var b = document.createElement('div');
  b.id = 'ndUpdateBanner';
  b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1e3a8a;color:#fff;padding:14px 16px;text-align:center;font-size:14px;font-weight:700;z-index:99999;cursor:pointer;letter-spacing:0.5px;';
  b.textContent = '🔄 New version available — tap to update';
  b.addEventListener('click', function() {
    b.textContent = 'Updating...';
    navigator.serviceWorker.addEventListener('controllerchange', function() { window.location.reload(); });
    if (navigator.serviceWorker.controller) navigator.serviceWorker.controller.postMessage({type:'SKIP_WAITING'});
    else window.location.reload();
  });
  document.body.appendChild(b);
}
</script>
